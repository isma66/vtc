<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VTC Confort</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1DB954, #1aa34a);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .tabs {
            display: flex;
            background: #111;
            padding: 12px;
            gap: 12px;
        }
        .tab {
            flex: 1;
            padding: 16px;
            background: #222;
            border: none;
            color: #fff;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            min-height: 60px;
        }
        .tab.active { background: #1DB954; color: #000; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn-spotify {
            background: #1DB954;
            text-align: center;
            padding: 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            margin: 20px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .search-box input {
            flex: 1;
            padding: 16px;
            background: #222;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
        }
        .search-box button {
            padding: 16px 24px;
            background: #1DB954;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .result-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .menu-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price { color: #ffd966; font-weight: bold; font-size: 18px; }
        .qr-box {
            background: white;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            margin-top: 20px;
        }
        #qrcode { display: flex; justify-content: center; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 11px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix/dist/qrcode.min.js"></script>
</head>
<body>

<div class="header">
    <h1>🍽️ VTC CONFORT</h1>
    <p>Musique & Pause Gourmande à bord</p>
</div>

<div class="tabs">
    <button class="tab active" onclick="showPage('music')">🎵 MUSIQUE</button>
    <button class="tab" onclick="showPage('menu')">🍹 MENU</button>
</div>

<div id="music-page" class="page active">
    <div id="login-section">
        <div class="btn-spotify" onclick="loginSpotify()">🔐 SE CONNECTER À SPOTIFY</div>
    </div>
    <div id="player-section" style="display:none;">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Artiste ou chanson... (ex: Daft Punk)">
            <button onclick="searchTrack()">Chercher</button>
        </div>
        <div id="results"></div>
        <div id="current-track" style="text-align:center; margin-top:20px; color:#1DB954;"></div>
    </div>
</div>

<div id="menu-page" class="page">
    <div class="menu-item"><div><strong>Eau</strong><br>50cl</div><div class="price">2€</div></div>
    <div class="menu-item"><div><strong>Oasis</strong><br>33cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Coca-Cola</strong><br>33cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Jus d'orange</strong><br>25cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Barre céréales</strong></div><div class="price">2€</div></div>
    <div class="menu-item"><div><strong>Café</strong><br>Expresso</div><div class="price">2,50€</div></div>
    <div class="qr-box"><p>💳 Paiement</p><div id="qrcode"></div></div>
    <div class="footer">🚗 À votre service</div>
</div>

<script>
    const CLIENT_ID = "2dbcb54425c7410f940310f2989e45f5";
    const REDIRECT_URI = "https://isma66.github.io/vtc/";
    let accessToken = null;

    function generateCodeVerifier() {
        const array = new Uint8Array(32);
        crypto.getRandomValues(array);
        return btoa(String.fromCharCode(...array)).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    }

    async function generateCodeChallenge(codeVerifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(codeVerifier);
        const digest = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    }

    async function loginSpotify() {
        const codeVerifier = generateCodeVerifier();
        localStorage.setItem('code_verifier', codeVerifier);
        const codeChallenge = await generateCodeChallenge(codeVerifier);
        const scope = "user-read-playback-state user-modify-playback-state streaming";
        window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}&code_challenge_method=S256&code_challenge=${codeChallenge}`;
    }

    async function exchangeCodeForToken(code) {
        const codeVerifier = localStorage.getItem('code_verifier');
        const res = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                client_id: CLIENT_ID,
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            })
        });
        const data = await res.json();
        if (data.access_token) {
            accessToken = data.access_token;
            localStorage.setItem('spotify_token', accessToken);
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('player-section').style.display = 'block';
            window.history.pushState("", "", window.location.pathname);
        }
    }

    function getTokenFromURL() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) exchangeCodeForToken(code);
        else {
            const saved = localStorage.getItem('spotify_token');
            if (saved) {
                accessToken = saved;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('player-section').style.display = 'block';
            }
        }
    }

    async function searchTrack() {
        const query = document.getElementById('searchInput').value;
        if (!query || !accessToken) return;
        document.getElementById('results').innerHTML = '<div style="text-align:center;">🔍 Recherche...</div>';
        const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=5`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const data = await res.json();
        const div = document.getElementById('results');
        div.innerHTML = '';
        if (data.tracks && data.tracks.items) {
            data.tracks.items.forEach(t => {
                let item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `<strong>${t.name}</strong><br>${t.artists.map(a=>a.name).join(', ')}`;
                item.onclick = () => playTrack(t.uri);
                div.appendChild(item);
            });
        }
    }

    async function playTrack(uri) {
        const trackDiv = document.getElementById('current-track');
        trackDiv.innerHTML = '🎵 Lancement...';
        const res = await fetch('https://api.spotify.com/v1/me/player/play', {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ uris: [uri] })
        });
        if (res.ok) {
            trackDiv.innerHTML = '🎵 En cours de lecture !';
            setTimeout(() => trackDiv.innerHTML = '', 3000);
        } else if (res.status === 404) {
            trackDiv.innerHTML = '⚠️ Ouvrez Spotify sur l\'iPad une fois, puis réessayez';
        }
    }

    function showPage(p) {
        document.getElementById('music-page').classList.toggle('active', p === 'music');
        document.getElementById('menu-page').classList.toggle('active', p === 'menu');
        const tabs = document.querySelectorAll('.tab');
        tabs[0].classList.toggle('active', p === 'music');
        tabs[1].classList.toggle('active', p === 'menu');
    }

    function makeQR() {
        const q = document.getElementById('qrcode');
        if (q && typeof QRCode !== 'undefined') {
            q.innerHTML = '';
            new QRCode(q, { text: "https://paypal.me/votrecompte", width: 150, height: 150 });
        }
    }

    document.getElementById('searchInput')?.addEventListener('keypress', e => { if(e.key === 'Enter') searchTrack(); });
    window.addEventListener('load', () => { getTokenFromURL(); makeQR(); });
</script>
</body>
</html>
