<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VTC Confort</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1DB954, #1aa34a);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .tabs {
            display: flex;
            background: #111;
            padding: 12px;
            gap: 12px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: #222;
            border: none;
            color: #fff;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active { background: #1DB954; color: #000; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn-spotify {
            background: #1DB954;
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .search-box input {
            flex: 1;
            padding: 14px;
            background: #222;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
        }
        .search-box button {
            padding: 14px 24px;
            background: #1DB954;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .result-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .result-item strong { font-size: 16px; }
        .result-item div { font-size: 13px; color: #1DB954; margin-top: 4px; }
        .menu-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price { color: #ffd966; font-weight: bold; font-size: 18px; }
        .qr-box {
            background: white;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            margin-top: 20px;
        }
        #qrcode { display: flex; justify-content: center; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 11px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix/dist/qrcode.min.js"></script>
</head>
<body>

<div class="header">
    <h1>🍽️ VTC CONFORT</h1>
    <p>Musique & Pause Gourmande à bord</p>
</div>

<div class="tabs">
    <button class="tab active" onclick="showPage('music')">🎵 MUSIQUE</button>
    <button class="tab" onclick="showPage('menu')">🍹 MENU</button>
</div>

<div id="music-page" class="page active">
    <div id="login-section">
        <div class="btn-spotify" onclick="loginSpotify()">🔐 Se connecter à Spotify</div>
    </div>
    <div id="player-section" style="display:none;">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Artiste ou chanson... (ex: Daft Punk)">
            <button onclick="searchTrack()">Chercher</button>
        </div>
        <div id="results"></div>
        <div id="current-track" style="text-align:center; margin-top:20px; color:#1DB954;"></div>
    </div>
</div>

<div id="menu-page" class="page">
    <div class="menu-item"><div><strong>Eau</strong><br>Bouteille 50cl</div><div class="price">2€</div></div>
    <div class="menu-item"><div><strong>Oasis</strong><br>33cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Coca-Cola</strong><br>33cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Jus d'orange</strong><br>Pur jus 25cl</div><div class="price">3€</div></div>
    <div class="menu-item"><div><strong>Barre céréales</strong><br>Énergétique</div><div class="price">2€</div></div>
    <div class="menu-item"><div><strong>Café</strong><br>Expresso</div><div class="price">2,50€</div></div>
    <div class="qr-box"><p>💳 Paiement rapide & sans contact</p><div id="qrcode"></div></div>
    <div class="footer">🚗 À votre service | CB, Apple Pay, Google Pay</div>
</div>

<script>
    const CLIENT_ID = "2dbc54425c7410f940310f2989e45f5";
    let accessToken = null;
    const REDIRECT_URI = window.location.origin + "/";

    function showPage(page) {
        document.getElementById('music-page').classList.toggle('active', page === 'music');
        document.getElementById('menu-page').classList.toggle('active', page === 'menu');
        document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(page==='music'&&i===0)||(page==='menu'&&i===1)));
    }

    function loginSpotify() {
        const scope = "user-read-playback-state user-modify-playback-state streaming";
        window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
    }

    function getTokenFromURL() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (token) {
            accessToken = token;
            localStorage.setItem('spotify_token', token);
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('player-section').style.display = 'block';
            window.history.pushState("", "", window.location.pathname);
        } else {
            const saved = localStorage.getItem('spotify_token');
            if (saved) {
                accessToken = saved;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('player-section').style.display = 'block';
            }
        }
    }

    async function searchTrack() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query || !accessToken) return;
        document.getElementById('results').innerHTML = '<div style="text-align:center;">🔍 Recherche...</div>';
        const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=10`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        if (res.status === 401) {
            localStorage.removeItem('spotify_token');
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('player-section').style.display = 'none';
            return;
        }
        const data = await res.json();
        const div = document.getElementById('results');
        div.innerHTML = '';
        if (data.tracks && data.tracks.items.length) {
            data.tracks.items.forEach(track => {
                let item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `<strong>${escapeHtml(track.name)}</strong><div>${track.artists.map(a=>a.name).join(', ')}</div>`;
                item.onclick = () => playTrack(track.uri);
                div.appendChild(item);
            });
        } else {
            div.innerHTML = '<div style="text-align:center; color:#888;">Aucun résultat</div>';
        }
    }

    async function playTrack(uri) {
        const trackDiv = document.getElementById('current-track');
        trackDiv.innerHTML = '🎵 Lancement...';
        const res = await fetch('https://api.spotify.com/v1/me/player/play', {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ uris: [uri] })
        });
        if (res.ok) {
            trackDiv.innerHTML = '🎵 En cours de lecture !';
            setTimeout(() => trackDiv.innerHTML = '', 3000);
        } else if (res.status === 404) {
            trackDiv.innerHTML = '⚠️ Ouvrez Spotify sur l\'iPad une fois, puis réessayez';
        } else {
            trackDiv.innerHTML = '❌ Erreur, reconnectez-vous';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function makeQR() {
        const q = document.getElementById('qrcode');
        if (q && typeof QRCode !== 'undefined') {
            q.innerHTML = '';
            new QRCode(q, { text: "https://paypal.me/votrecompte", width: 150, height: 150 });
        }
    }

    document.getElementById('searchInput')?.addEventListener('keypress', e => { if(e.key === 'Enter') searchTrack(); });
    window.addEventListener('load', () => { getTokenFromURL(); makeQR(); });
</script>
</body>
</html>
